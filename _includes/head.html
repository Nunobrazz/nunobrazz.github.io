{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
  rel="stylesheet">

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}"
  type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';

  /* Apply saved theme BEFORE any content renders to prevent white flash.
     Reads the preference from localStorage. Falls back to OS dark-mode
     preference. If neither is set, defaults to dark. */
  (function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark' || saved === 'light') {
      if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      /* OS prefers light — leave default (no data-theme) */
    } else {
      /* No preference or OS prefers dark — start dark */
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<!-- Turbo for SPA-like navigation -->
<script type="module">
  import 'https://esm.sh/@hotwired/turbo';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css?v={{ site.time | date: '%s' }}">

<meta http-equiv="cleartype" content="on">
