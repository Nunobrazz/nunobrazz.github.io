<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';

  /* Apply saved theme BEFORE any content renders to prevent white flash.
     Reads the preference from localStorage. Falls back to OS dark-mode
     preference. If neither is set, defaults to dark. */
  (function() {
    var saved = localStorage.getItem('theme');
    var isDark = false;
    if (saved === 'dark' || saved === 'light') {
      isDark = saved === 'dark';
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      isDark = false;
    } else {
      isDark = true;
    }
    if (isDark) {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.documentElement.style.colorScheme = 'dark';
    } else {
      document.documentElement.style.colorScheme = 'light';
    }
    /* Update theme-color meta tags to match background */
    var tcLight = document.querySelector('#meta-theme-color-light');
    var tcDark = document.querySelector('#meta-theme-color-dark');
    if (tcLight) tcLight.setAttribute('content', isDark ? '#0f1923' : '#f2f0eb');
    if (tcDark) tcDark.setAttribute('content', isDark ? '#0f1923' : '#f2f0eb');
  })();
</script>

<!-- Turbo for SPA-like navigation -->
<script type="module">
  import 'https://esm.sh/@hotwired/turbo';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css?v={{ site.time | date: '%s' }}">
