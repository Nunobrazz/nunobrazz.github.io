<!DOCTYPE html>
<!--
    Confluent Meridians — Generative Art
    Multiple overlapping flow fields create convergence patterns
    where invisible currents of influence become visible through
    the patient accumulation of particle traces.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confluent Meridians</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '\2022';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--anthropic-orange);
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 0%;
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Control Sidebar -->
        <div class="sidebar">
            <h1>Confluent Meridians</h1>
            <div class="subtitle">Overlapping flow fields reveal convergence patterns through the patient accumulation of particle traces.</div>

            <!-- Seed Section (FIXED) -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()" aria-label="Previous seed">&larr; Prev</button>
                    <button class="button secondary" onclick="nextSeed()" aria-label="Next seed">Next &rarr;</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()" aria-label="Random seed">&circlearrowright; Random</button>
            </div>

            <!-- Parameters Section (VARIABLE) -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="2000" max="12000" step="500" value="6000" oninput="updateParam('particleCount', this.value)" aria-label="Particle count">
                        <span class="value-display" id="particleCount-value">6000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Flow Layers</label>
                    <div class="slider-container">
                        <input type="range" id="flowLayers" min="2" max="6" step="1" value="4" oninput="updateParam('flowLayers', this.value)" aria-label="Flow layers">
                        <span class="value-display" id="flowLayers-value">4</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.008" step="0.0005" value="0.003" oninput="updateParam('noiseScale', this.value)" aria-label="Noise scale">
                        <span class="value-display" id="noiseScale-value">0.003</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Particle Speed</label>
                    <div class="slider-container">
                        <input type="range" id="speed" min="0.5" max="3.0" step="0.1" value="1.2" oninput="updateParam('speed', this.value)" aria-label="Particle speed">
                        <span class="value-display" id="speed-value">1.2</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Trace Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="traceAlpha" min="2" max="25" step="1" value="8" oninput="updateParam('traceAlpha', this.value)" aria-label="Trace opacity">
                        <span class="value-display" id="traceAlpha-value">8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Lifetime</label>
                    <div class="slider-container">
                        <input type="range" id="lifetime" min="100" max="600" step="25" value="300" oninput="updateParam('lifetime', this.value)" aria-label="Particle lifetime">
                        <span class="value-display" id="lifetime-value">300</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Turbulence</label>
                    <div class="slider-container">
                        <input type="range" id="turbulence" min="0.5" max="4.0" step="0.1" value="1.8" oninput="updateParam('turbulence', this.value)" aria-label="Turbulence intensity">
                        <span class="value-display" id="turbulence-value">1.8</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Warm (High Curvature)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#c47d2b" onchange="updateColor('color1', this.value)" aria-label="Warm color">
                        <span class="color-value" id="color1-value">#c47d2b</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Cool (Laminar Flow)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#1a7a6d" onchange="updateColor('color2', this.value)" aria-label="Cool color">
                        <span class="color-value" id="color2-value">#1a7a6d</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Background</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorBg" value="#f0ece4" onchange="updateColor('colorBg', this.value)" aria-label="Background color">
                        <span class="color-value" id="colorBg-value">#f0ece4</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section (FIXED) -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row" style="margin-bottom:8px">
                    <button class="button" onclick="regenerate()" aria-label="Regenerate artwork">Regenerate</button>
                    <button class="button secondary" onclick="resetParameters()" aria-label="Reset parameters">Reset</button>
                </div>
                <button class="button tertiary" onclick="downloadImage()" aria-label="Download as PNG">Download PNG</button>
                <div class="progress-bar" id="progress-bar" style="display:none">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Main Canvas Area -->
        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing&hellip;</div>
            </div>
        </div>
    </div>

    <script>
        // =====================================================================
        // PARAMETERS
        // =====================================================================

        let params = {
            seed: 12345,
            particleCount: 6000,
            flowLayers: 4,
            noiseScale: 0.003,
            speed: 1.2,
            traceAlpha: 8,
            lifetime: 300,
            turbulence: 1.8,
            colorWarm: '#c47d2b',
            colorCool: '#1a7a6d',
            colorBg: '#f0ece4'
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        // =====================================================================
        // FLOW FIELD SYSTEM
        // =====================================================================

        const GOLDEN_ANGLE = 2.39996322972865332; // radians
        const PHI = 1.6180339887498949;

        let particles = [];
        let flowLayers = [];
        let frameCount_ = 0;
        let totalFrames = 400;
        let isRunning = false;
        let bgCol, warmCol, coolCol;

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            pixelDensity(1);
            document.querySelector('.loading').style.display = 'none';
            regenerate();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            bgCol = hexToP5(params.colorBg);
            warmCol = hexToP5(params.colorWarm);
            coolCol = hexToP5(params.colorCool);

            // Build layered flow fields
            // Each layer has its own noise offset, scale multiplier, and strength
            flowLayers = [];
            for (let i = 0; i < params.flowLayers; i++) {
                let t = i / params.flowLayers;
                flowLayers.push({
                    offsetX: random(1000),
                    offsetY: random(1000),
                    // Each layer operates at a different spatial frequency
                    // using golden angle spacing to avoid harmonic overlap
                    scaleMult: pow(PHI, i) * 0.6,
                    // Strength decays with higher frequency layers
                    strength: 1.0 / (1.0 + i * 0.5),
                    // Phase rotation so fields aren't aligned
                    phaseOffset: i * GOLDEN_ANGLE
                });
            }

            // Spawn particles at edges and random interior points
            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(createParticle(i));
            }

            frameCount_ = 0;
            background(bgCol);
        }

        function createParticle(index) {
            let x, y;
            let r = random();

            if (r < 0.3) {
                // Spawn at edges
                let edge = floor(random(4));
                switch (edge) {
                    case 0: x = random(width); y = 0; break;
                    case 1: x = width; y = random(height); break;
                    case 2: x = random(width); y = height; break;
                    case 3: x = 0; y = random(height); break;
                }
            } else {
                // Spawn in interior
                x = random(width);
                y = random(height);
            }

            return {
                x: x,
                y: y,
                px: x,
                py: y,
                age: 0,
                maxAge: params.lifetime + random(-80, 80),
                curvatureAccum: 0,
                prevAngle: 0,
                index: index
            };
        }

        function sampleFlowField(x, y) {
            // Composite vector from all flow layers
            let vx = 0;
            let vy = 0;

            for (let i = 0; i < flowLayers.length; i++) {
                let layer = flowLayers[i];
                let scale = params.noiseScale * layer.scaleMult;
                let nx = (x * scale) + layer.offsetX;
                let ny = (y * scale) + layer.offsetY;

                let angle = noise(nx, ny) * TWO_PI * params.turbulence + layer.phaseOffset;
                vx += cos(angle) * layer.strength;
                vy += sin(angle) * layer.strength;
            }

            // Normalize and scale
            let mag = sqrt(vx * vx + vy * vy);
            if (mag > 0) {
                vx = (vx / mag) * params.speed;
                vy = (vy / mag) * params.speed;
            }

            return { x: vx, y: vy, angle: atan2(vy, vx) };
        }

        function draw() {
            if (!isRunning) return;

            // Run multiple steps per frame for faster generation
            let stepsPerFrame = 8;

            for (let s = 0; s < stepsPerFrame; s++) {
                if (frameCount_ >= totalFrames) {
                    isRunning = false;
                    hideProgress();
                    noLoop();
                    return;
                }

                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];

                    if (p.age >= p.maxAge) {
                        // Respawn
                        let np = createParticle(p.index);
                        particles[i] = np;
                        continue;
                    }

                    // Sample composite flow field
                    let flow = sampleFlowField(p.x, p.y);

                    // Store previous position
                    p.px = p.x;
                    p.py = p.y;

                    // Move
                    p.x += flow.x;
                    p.y += flow.y;

                    // Track curvature (angular change)
                    if (p.age > 0) {
                        let angleDiff = abs(flow.angle - p.prevAngle);
                        if (angleDiff > PI) angleDiff = TWO_PI - angleDiff;
                        // Exponential moving average of curvature
                        p.curvatureAccum = p.curvatureAccum * 0.92 + angleDiff * 0.08;
                    }
                    p.prevAngle = flow.angle;

                    // Wrap around edges
                    if (p.x < 0) p.x += width;
                    if (p.x > width) p.x -= width;
                    if (p.y < 0) p.y += height;
                    if (p.y > height) p.y -= height;

                    // Draw trace
                    // Curvature determines color: high curvature = warm, low = cool
                    let curvatureNorm = constrain(p.curvatureAccum * 12, 0, 1);

                    let r_ = lerp(red(coolCol), red(warmCol), curvatureNorm);
                    let g_ = lerp(green(coolCol), green(warmCol), curvatureNorm);
                    let b_ = lerp(blue(coolCol), blue(warmCol), curvatureNorm);

                    // Fade in/out at birth and death
                    let ageFrac = p.age / p.maxAge;
                    let alphaFade = 1.0;
                    if (ageFrac < 0.05) alphaFade = ageFrac / 0.05;
                    if (ageFrac > 0.9) alphaFade = (1.0 - ageFrac) / 0.1;

                    let alpha = params.traceAlpha * alphaFade;

                    // Only draw if moved meaningfully (avoid blobs at stagnation points)
                    let dx = p.x - p.px;
                    let dy = p.y - p.py;
                    if (dx * dx + dy * dy > 0.1) {
                        stroke(r_, g_, b_, alpha);
                        strokeWeight(0.8);
                        line(p.px, p.py, p.x, p.y);
                    }

                    p.age++;
                }

                frameCount_++;
            }

            // Update progress
            let progress = (frameCount_ / totalFrames) * 100;
            updateProgress(progress);
        }

        // =====================================================================
        // UTILITY FUNCTIONS
        // =====================================================================

        function hexToP5(hex) {
            return color(hex);
        }

        // =====================================================================
        // UI CONTROL HANDLERS
        // =====================================================================

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent =
                Number.isInteger(numVal) ? numVal : numVal.toFixed(
                    paramName === 'noiseScale' ? 4 : 1
                );
        }

        function updateColor(colorId, value) {
            document.getElementById(colorId + '-value').textContent = value;
            if (colorId === 'color1') params.colorWarm = value;
            else if (colorId === 'color2') params.colorCool = value;
            else if (colorId === 'colorBg') params.colorBg = value;
        }

        function regenerate() {
            showProgress();
            isRunning = true;
            initializeSystem();
            loop();
        }

        function showProgress() {
            let bar = document.getElementById('progress-bar');
            bar.style.display = 'block';
            document.getElementById('progress-fill').style.width = '0%';
        }

        function hideProgress() {
            setTimeout(function () {
                document.getElementById('progress-bar').style.display = 'none';
            }, 600);
        }

        function updateProgress(pct) {
            document.getElementById('progress-fill').style.width = pct + '%';
        }

        function downloadImage() {
            saveCanvas('confluent-meridians-' + params.seed, 'png');
        }

        // =====================================================================
        // SEED CONTROL FUNCTIONS (FIXED)
        // =====================================================================

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                regenerate();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            regenerate();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            regenerate();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            regenerate();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            // Update all UI elements
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('flowLayers').value = params.flowLayers;
            document.getElementById('flowLayers-value').textContent = params.flowLayers;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale.toFixed(4);
            document.getElementById('speed').value = params.speed;
            document.getElementById('speed-value').textContent = params.speed;
            document.getElementById('traceAlpha').value = params.traceAlpha;
            document.getElementById('traceAlpha-value').textContent = params.traceAlpha;
            document.getElementById('lifetime').value = params.lifetime;
            document.getElementById('lifetime-value').textContent = params.lifetime;
            document.getElementById('turbulence').value = params.turbulence;
            document.getElementById('turbulence-value').textContent = params.turbulence;

            document.getElementById('color1').value = params.colorWarm;
            document.getElementById('color1-value').textContent = params.colorWarm;
            document.getElementById('color2').value = params.colorCool;
            document.getElementById('color2-value').textContent = params.colorCool;
            document.getElementById('colorBg').value = params.colorBg;
            document.getElementById('colorBg-value').textContent = params.colorBg;

            updateSeedDisplay();
            regenerate();
        }

        // Initialize UI on load
        window.addEventListener('load', function () {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
